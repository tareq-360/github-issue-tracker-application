<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- daisyUI Link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- geist Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font-awesome CDN  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;
        }
    </style>


</head>

<body class=" bg-[#F8FAFC]">

    <!-- home page section -->
    <section>
        <header>
            <div class="navbar bg-base-100 shadow-sm py-5  space-y-8 flex-col md:flex-row md:space-y-0 md:py-0">
                <div class="flex flex-1  items-center space-x-4">
                    <img class=" w-10" src="./assets/github-logo.png" alt="">
                    <h1 class="font-bold text-2xl">Github Issues Tracker</h1>
                </div>
                <div class="flex gap-2">
                    <div class="join">
                        <div>
                            <label class="input validator join-item">
                                <i class="fa-solid fa-magnifying-glass"></i>
                                <input type="text" placeholder="Search Issues" required />
                            </label>

                        </div>
                        <button class="btn btn-primary join-item">+ New Issue</button>
                    </div>
                </div>
            </div>
        </header>

        <main class=" w-8/12 my-15 mx-auto space-y-5">
            <!-- buttons  -->
            <div class="buttons bg-white p-5 rounded-md shadow-sm ">
                <button class="btn btn-primary w-20">All</button>
                <button class="btn btn-primary w-20">Open</button>
                <button class="btn btn-primary w-20">Closed</button>
            </div>

            <!--show  Issues section -->
            <div class="issuesCount flex justify-between items-center bg-white p-5">
                <div class="left flex ">
                    <img class=" w-10 h-10 p-2 my-auto rounded-full bg-orange-100" src="./assets/Aperture.png" alt="">
                    <h2 class="font-bold text-xl pl-3">40 Issues <br><span class=" text-sm font-normal">Track and manage
                            your project issues</span></h2>
                </div>
                <div class="right flex justify-center items-center space-x-5">
                    <div class="flex  justify-center items-center">
                        <img class="w-4" src="./assets/Open-Status.png" alt="">
                        <p class="font-semibold">Open</p>

                    </div>
                    <div class="flex  justify-center items-center">
                        <img class="w-4" src="./assets/Closed- Status .png" alt="">
                        <p class="font-semibold">Closed</p>

                    </div>
                </div>
            </div>
        </main>
    </section>

    <!-- Login Section -->
    <section class="flex justify-center items-center py-10">
        <div class="loginInfo">
            <fieldset class="fieldset bg-white border-base-300 rounded-box w-xs border p-4">
                <div class="text-center ">
                    <img class="mx-auto pb-4" src="./assets/github-logo.png" alt="">
                    <h1 class="font-bold text-[24px]">GitHub Issues Tracker</h1>
                    <p>Sign in to manage your issues</p>
                </div>
                <!-- <legend class="fieldset-legend">Login</legend> -->

                <label class="label">Username</label>
                <input type="text" class="input" placeholder="Enter Email" />
                <label class="text-[#4A00FF]">Username: admin</label>

                <label class="label">Password</label>
                <input type="password" class="input" placeholder="Enter Password" />
                <label class="text-[#4A00FF]">Default Password: admin123</label>

                <button class="btn btn-primary mt-4">Sign In</button>

                <div class="divider">OR</div>
                <p class="text-center">Demo Credentials: </p>
                <div class="text-center bg-gray-100 py-5">

                    <p class="font-bold">Username: <span class="font-normal">admin</span></p>
                    <p class="font-bold">Password: <span class="font-normal">admin123</span></p>
                </div>
            </fieldset>
        </div>

    </section>


    <script src="./script.js"></script>
</body>

</html>
